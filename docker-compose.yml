version: '3.3'

services:
  evolution-api:
    image: evolutionapi/evolution-api:v2.1.1 # Versão mais recente e estável
    container_name: evolution-api
    ports:
      - "8080:8080"
    environment:
      - SERVER_URL=http://localhost:8080
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=SUA_API_KEY_AQUI_123 # Esta será a sua API KEY
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://postgres:postgres@postgres:5432/evolution?schema=public
      - DATABASE_CONNECTION_CLIENT_NAME=evolution_exchange
      - REDIS_URI=redis://redis:6379/1
      - CACHE_REDIS_URI=redis://redis:6379/1
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:15-alpine
    container_name: evolution-postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=evolution
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    container_name: evolution-redis
    ports:
      - "6379:6379"
